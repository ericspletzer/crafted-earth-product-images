<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #fff;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    /* Product image */
    .card-image-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f8f9fa;
      min-height: 0;
    }

    .card-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-image-wrap.no-image::after {
      content: 'No image';
      font-size: 11px;
      color: #bbb;
    }

    /* Footer: make · model and short title */
    .card-footer {
      flex-shrink: 0;
      padding: 7px 10px 6px;
      background: #fff;
      border-top: 1px solid #ececec;
    }

    .card-make-model {
      font-size: 11px;
      font-weight: 700;
      color: #0c3b5e;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-title {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hover overlay — full description */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 59, 94, 0.94);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px 16px;
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-make-model {
      font-size: 11px;
      font-weight: 700;
      color: #aed47d;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .overlay-notes {
      font-size: 10.5px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.88);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 8;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-image-wrap" id="imageWrap">
      <img class="card-image" id="img" src="" alt=""
           onerror="this.parentElement.classList.add('no-image'); this.style.display='none'">
    </div>
    <div class="card-footer">
      <div class="card-make-model" id="makeModel"></div>
      <div class="card-title"      id="titleEl"></div>
    </div>
    <div class="card-overlay">
      <div class="overlay-make-model" id="overlayMakeModel"></div>
      <div class="overlay-title"      id="overlayTitle"></div>
      <div class="overlay-notes"      id="overlayNotes"></div>
    </div>
  </div>

  <script>
    const p      = new URLSearchParams(location.search);
    const make   = p.get('make')  || '';
    const model  = p.get('model') || '';
    const title  = p.get('title') || '';
    const notes  = p.get('notes') || '';
    const image  = p.get('image') || '';

    const makeModel = [make, model].filter(Boolean).join(' \u00b7 ');

    if (image) {
      document.getElementById('img').src = image;
      document.getElementById('img').alt = title || makeModel;
    } else {
      document.getElementById('imageWrap').classList.add('no-image');
    }

    document.getElementById('makeModel').textContent       = makeModel;
    document.getElementById('titleEl').textContent         = title;
    document.getElementById('overlayMakeModel').textContent = makeModel;
    document.getElementById('overlayTitle').textContent    = title;
    document.getElementById('overlayNotes').textContent    = notes;
  </script>
</body>
</html>
