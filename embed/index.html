<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* Full-fit image — natural proportions, no crop */
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card.no-image {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card.no-image::before {
      content: 'No image';
      font-size: 11px;
      color: #bbb;
    }

    /* Caption — no gradient, pure text shadow for legibility */
    .card-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 12px;
      pointer-events: none;
      text-align: right;
    }

    .card-make-model {
      font-size: 10.5px;
      font-weight: 700;
      color: #222;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.95),
        0 0 6px rgba(255,255,255,0.9),
        0 2px 8px rgba(255,255,255,0.7),
        0 0 18px rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: auto;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: #222;
      margin-top: 2px;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.95),
        0 0 6px rgba(255,255,255,0.9),
        0 2px 8px rgba(255,255,255,0.7),
        0 0 18px rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-make-model a {
      color: inherit;
      text-decoration: none;
    }

    .card-make-model a:hover {
      text-decoration: underline;
    }

    /* Hover overlay — all product fields */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 48, 78, 0.94);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px 16px;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
      overflow-y: auto;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-field { }

    .overlay-label {
      font-size: 8.5px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .overlay-value {
      font-size: 11px;
      line-height: 1.5;
      color: #fff;
    }

    .overlay-value.headline {
      font-size: 13px;
      font-weight: 600;
    }

    /* Thin scrollbar for long content */
    .card-overlay::-webkit-scrollbar { width: 3px; }
    .card-overlay::-webkit-scrollbar-track { background: transparent; }
    .card-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img class="card-image" id="img" src="" alt=""
         onerror="document.getElementById('card').classList.add('no-image'); this.style.display='none'">
    <div class="card-caption">
      <div class="card-make-model" id="makeModel"></div>
      <div class="card-title" id="titleEl"></div>
    </div>
    <div class="card-overlay" id="overlay"></div>
  </div>

  <script>
    const p          = new URLSearchParams(location.search);
    const make       = p.get('make')        || '';
    const collection = p.get('collection')  || '';
    const model      = p.get('model')       || '';
    const title      = p.get('title')       || '';
    const description= p.get('description') || '';
    const notes      = p.get('notes')       || '';
    const vendor     = p.get('vendor')      || '';
    const sku        = p.get('sku')         || '';
    const unit       = p.get('unit')        || '';
    const unitcost   = p.get('unitcost')    || '';
    const division   = p.get('division')    || '';
    const project    = p.get('project')     || '';
    const image      = p.get('image')       || '';
    const productUrl = p.get('producturl')  || '';

    // Caption: make · collection · model
    const captionParts = [make, collection, model].filter(Boolean);
    const captionText  = captionParts.join(' \u00b7 ');

    const makeModelEl = document.getElementById('makeModel');
    if (productUrl && captionText) {
      const a = document.createElement('a');
      a.href   = productUrl;
      a.target = '_blank';
      a.rel    = 'noopener noreferrer';
      a.textContent = captionText;
      makeModelEl.appendChild(a);
    } else {
      makeModelEl.textContent = captionText;
    }

    document.getElementById('titleEl').textContent = title;

    // Image
    if (image) {
      const img = document.getElementById('img');
      img.src = image;
      img.alt = title || captionText;
    } else {
      document.getElementById('card').classList.add('no-image');
      document.getElementById('img').style.display = 'none';
    }

    // Hover overlay — all non-blank fields, in display order
    const fields = [
      { label: 'Make',        value: make,        headline: false },
      { label: 'Collection',  value: collection,  headline: false },
      { label: 'Model',       value: model,       headline: false },
      { label: 'Title',       value: title,       headline: true  },
      { label: 'Description', value: description, headline: false },
      { label: 'Notes',       value: notes,       headline: false },
      { label: 'Vendor',      value: vendor,      headline: false },
      { label: 'SKU',         value: sku,         headline: false },
      { label: 'Unit',        value: unit,        headline: false },
      { label: 'Unit Cost',   value: unitcost,    headline: false },
      { label: 'Division',    value: division,    headline: false },
      { label: 'Project',     value: project,     headline: false },
    ];

    const overlay = document.getElementById('overlay');
    fields.forEach(({ label, value, headline }) => {
      if (!value) return;
      const fieldEl = document.createElement('div');
      fieldEl.className = 'overlay-field';

      const labelEl = document.createElement('div');
      labelEl.className = 'overlay-label';
      labelEl.textContent = label;

      const valueEl = document.createElement('div');
      valueEl.className = headline ? 'overlay-value headline' : 'overlay-value';
      valueEl.textContent = value;

      fieldEl.appendChild(labelEl);
      fieldEl.appendChild(valueEl);
      overlay.appendChild(fieldEl);
    });
  </script>
</body>
</html>
