<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    /* Full-bleed image */
    .card-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card.no-image::before {
      content: 'No image';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #666;
    }

    /* Bottom gradient caption — always visible */
    .card-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 12px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }

    .card-make-model {
      font-size: 10px;
      font-weight: 700;
      color: #aed47d;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      margin-top: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hover overlay — full description */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 59, 94, 0.93);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-make-model {
      font-size: 10px;
      font-weight: 700;
      color: #aed47d;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .overlay-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .overlay-notes {
      font-size: 10.5px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.88);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 9;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img class="card-image" id="img" src="" alt=""
         onerror="document.getElementById('card').classList.add('no-image'); this.style.display='none'">
    <div class="card-caption">
      <div class="card-make-model" id="makeModel"></div>
      <div class="card-title"      id="titleEl"></div>
    </div>
    <div class="card-overlay">
      <div class="overlay-make-model" id="overlayMakeModel"></div>
      <div class="overlay-title"      id="overlayTitle"></div>
      <div class="overlay-notes"      id="overlayNotes"></div>
    </div>
  </div>

  <script>
    const p      = new URLSearchParams(location.search);
    const make   = p.get('make')  || '';
    const model  = p.get('model') || '';
    const title  = p.get('title') || '';
    const notes  = p.get('notes') || '';
    const image  = p.get('image') || '';

    const makeModel = [make, model].filter(Boolean).join(' \u00b7 ');

    if (image) {
      document.getElementById('img').src = image;
      document.getElementById('img').alt = title || makeModel;
    } else {
      document.getElementById('card').classList.add('no-image');
    }

    document.getElementById('makeModel').textContent        = makeModel;
    document.getElementById('titleEl').textContent          = title;
    document.getElementById('overlayMakeModel').textContent = makeModel;
    document.getElementById('overlayTitle').textContent     = title;
    document.getElementById('overlayNotes').textContent     = notes;
  </script>
</body>
</html>
